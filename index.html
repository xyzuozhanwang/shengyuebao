<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="声乐宝" />
    <title>声乐宝</title>
    <style>
:root {
  --ink: #2d2f33;
  --muted: #777b83;
  --line: #edf0f3;
  --bg: #f7f7f7;
  --card: #ffffff;
  --accent: #f6ca53;
  --accent-strong: #e19a34;
  --shadow: 0 12px 28px rgba(31, 34, 39, 0.08);
  --radius: 20px;
  color-scheme: light;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: #fff;
  color: var(--ink);
}

button {
  border: 0;
  color: inherit;
  font: inherit;
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
  min-height: 100dvh;
  background: #fff;
  overflow-x: hidden;
}

.phone-page {
  min-height: 100vh;
  min-height: 100dvh;
  padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 24px);
  margin: 0 auto;
  max-width: 480px;
}

.practice-page {
  background: var(--bg);
  padding-bottom: calc(env(safe-area-inset-bottom) + 282px);
}

.topbar {
  display: grid;
  grid-template-columns: 48px 1fr 48px;
  align-items: center;
  min-height: 62px;
}

.title {
  margin: 0;
  text-align: center;
  font-size: 25px;
  font-weight: 760;
  letter-spacing: 0;
}

.icon-button {
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  background: transparent;
  border-radius: 50%;
}

.user-icon,
.vip-icon,
.back-icon,
.close-icon,
.edit-icon {
  position: relative;
  width: 30px;
  height: 30px;
}

.user-icon::before {
  content: "";
  position: absolute;
  left: 8px;
  top: 3px;
  width: 13px;
  height: 13px;
  border: 3px solid #26292e;
  border-radius: 50%;
}

.user-icon::after {
  content: "";
  position: absolute;
  left: 3px;
  bottom: 2px;
  width: 24px;
  height: 15px;
  border: 3px solid #26292e;
  border-bottom: 0;
  border-radius: 18px 18px 0 0;
}

.vip-icon {
  transform: rotate(45deg);
  border: 3px solid #26292e;
  border-radius: 6px;
}

.vip-icon::after {
  content: "V";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  transform: rotate(-45deg);
  font-weight: 800;
  font-size: 17px;
}

.back-icon::before,
.back-icon::after {
  content: "";
  position: absolute;
  left: 7px;
  top: 14px;
  width: 22px;
  height: 3px;
  background: #292c31;
  border-radius: 10px;
  transform-origin: left center;
}

.back-icon::before {
  transform: rotate(45deg);
}

.back-icon::after {
  transform: rotate(-45deg);
}

.close-icon::before,
.close-icon::after {
  content: "";
  position: absolute;
  left: 4px;
  top: 14px;
  width: 24px;
  height: 3px;
  background: #777b83;
  border-radius: 999px;
}

.close-icon::before {
  transform: rotate(45deg);
}

.close-icon::after {
  transform: rotate(-45deg);
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-top: 16px;
}

.feature-card {
  min-height: 154px;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  padding: 18px 14px;
  text-align: left;
  background: var(--tone);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
}

.feature-card h2 {
  margin: 0 0 8px;
  font-size: clamp(24px, 7vw, 31px);
  line-height: 1.06;
  font-weight: 800;
  letter-spacing: 0;
}

.feature-card p {
  margin: 0;
  max-width: 8em;
  color: #6f747b;
  font-size: 17px;
  line-height: 1.45;
}

.feature-art {
  position: absolute;
  right: 12px;
  bottom: 14px;
  width: 76px;
  height: 66px;
  filter: drop-shadow(0 12px 10px rgba(151, 112, 59, 0.18));
}

.art-card {
  background: rgba(255, 255, 255, 0.78);
  border-radius: 8px;
  box-shadow: 12px -7px 0 rgba(255, 255, 255, 0.48);
}

.art-staff::before,
.art-score::before,
.art-chord::before {
  content: "";
  position: absolute;
  inset: 16px 10px;
  background: repeating-linear-gradient(to bottom, #d7cdb8 0 1px, transparent 1px 11px);
}

.art-staff::after {
  content: "";
  position: absolute;
  left: 16px;
  top: 20px;
  width: 48px;
  height: 29px;
  border: 3px solid var(--accent-strong);
  border-top-color: transparent;
  clip-path: polygon(0 40%, 25% 45%, 25% 18%, 52% 20%, 52% 78%, 76% 73%, 76% 42%, 100% 38%, 100% 100%, 0 100%);
}

.art-notes::before {
  content: "♫";
  position: absolute;
  left: 17px;
  top: 8px;
  font-size: 43px;
  color: #ee9242;
}

.art-video {
  border: 7px solid #64866e;
  background: linear-gradient(160deg, #446f5d, #b9d8c3);
}

.art-video::before {
  content: "♪  ♫";
  position: absolute;
  left: 10px;
  top: 4px;
  color: #fff;
  font-size: 18px;
}

.art-video::after {
  content: "";
  position: absolute;
  left: 18px;
  bottom: 8px;
  width: 42px;
  height: 34px;
  background: radial-gradient(circle at 14px 10px, #1e2530 0 7px, transparent 8px), radial-gradient(circle at 31px 12px, #f9e6d9 0 8px, transparent 9px), linear-gradient(90deg, #fff 0 47%, #f7b5a5 48% 100%);
  border-radius: 7px;
}

.art-score::after {
  content: "";
  position: absolute;
  left: 17px;
  top: 18px;
  width: 43px;
  height: 31px;
  background: repeating-linear-gradient(to right, #2d2f33 0 2px, transparent 2px 7px);
  opacity: 0.45;
  clip-path: polygon(0 8%, 100% 8%, 100% 20%, 0 20%, 0 38%, 100% 38%, 100% 50%, 0 50%, 0 68%, 100% 68%, 100% 80%, 0 80%);
}

.art-piano {
  height: 58px;
  bottom: 18px;
  border-radius: 23px 23px 9px 9px;
  background: #142034;
}

.art-piano::before {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 5px;
  height: 34px;
  background: repeating-linear-gradient(to right, #fff 0 12px, #d9d9dc 12px 14px);
  border-radius: 0 0 5px 5px;
}

.art-piano::after {
  content: "";
  position: absolute;
  left: 18px;
  top: 22px;
  width: 8px;
  height: 24px;
  background: #111;
  box-shadow: 14px 0 #111, 42px 0 #111;
  border-radius: 0 0 4px 4px;
}

.art-tools::before {
  content: "";
  position: absolute;
  right: 17px;
  bottom: 2px;
  width: 32px;
  height: 64px;
  background: linear-gradient(#fff, #e9eef4);
  border: 5px solid #1d2230;
  border-radius: 12px 12px 5px 5px;
  clip-path: polygon(35% 0, 65% 0, 100% 100%, 0 100%);
}

.art-tools::after {
  content: "♩";
  position: absolute;
  left: 5px;
  top: 8px;
  width: 33px;
  height: 33px;
  display: grid;
  place-items: center;
  color: #e58b3b;
  background: #fffaf0;
  border-radius: 50%;
  transform: rotate(-18deg);
}

.art-ear::before {
  content: "";
  position: absolute;
  right: 10px;
  bottom: 0;
  width: 46px;
  height: 58px;
  background: #f7f7f7;
  border-radius: 24px 24px 10px 10px;
}

.art-ear::after {
  content: "♪♪";
  position: absolute;
  right: 46px;
  top: 9px;
  color: #1f2430;
  background: #fff;
  border-radius: 6px;
  padding: 4px 7px;
  font-size: 16px;
}

.art-chord::after {
  content: "C  F  G";
  position: absolute;
  left: 13px;
  bottom: 9px;
  width: 50px;
  color: #999;
  font-size: 13px;
  line-height: 1.5;
  text-align: center;
  background: linear-gradient(90deg, #eceff3 0 31%, #f7eef0 32% 64%, #f0f0eb 65%);
}

.panel {
  margin-top: 16px;
  padding: 22px 18px;
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: var(--shadow);
}

.melody-panel {
  min-height: 220px;
}

.scale-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}

.scale-select,
.round-control,
.pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: #f3f3f3;
  white-space: nowrap;
}

.scale-select {
  gap: 7px;
  padding: 0;
  background: transparent;
  font-size: 23px;
  font-weight: 800;
}

.chevron-dot,
.round-control {
  width: 28px;
  height: 28px;
  background: var(--accent);
  font-weight: 850;
}

.chevron-dot::before {
  content: "";
  width: 9px;
  height: 9px;
  border-right: 3px solid #323438;
  border-bottom: 3px solid #323438;
  transform: translateY(-2px) rotate(45deg);
}

.tempo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  white-space: nowrap;
}

.status-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  margin-bottom: 14px;
}

.status-strip span {
  min-height: 32px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  background: #f3f4f6;
  color: #7d8289;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
}

.status-strip span.active {
  background: #fff0bb;
  color: #75540d;
}

.score {
  display: flex;
  align-items: end;
  gap: 10px;
  min-height: 56px;
  overflow-x: auto;
  scrollbar-width: none;
}

.score::-webkit-scrollbar {
  display: none;
}

.tonic-stack {
  display: grid;
  gap: 1px;
  padding-bottom: 2px;
  font-size: 21px;
  line-height: 1;
}

.notation {
  min-width: max-content;
  font-size: 38px;
  line-height: 1.08;
  letter-spacing: 0;
  font-weight: 620;
}

.notation .bar {
  color: #202328;
  padding: 0 3px;
}

.notation .dash {
  padding: 0 18px;
}

.notation .under {
  display: inline-block;
  border-bottom: 2px solid currentColor;
  line-height: 0.92;
}

.score-grid {
  display: grid;
  grid-template-columns: repeat(32, minmax(18px, 1fr));
  grid-auto-rows: 42px;
  gap: 5px;
  padding: 8px 0 12px;
  overflow-x: auto;
  scrollbar-width: none;
}

.score-grid::-webkit-scrollbar {
  display: none;
}

.score-cell {
  min-width: 0;
  display: grid;
  place-items: center;
  border-radius: 10px;
  background: #f5f6f8;
  color: #24272c;
  font-size: 23px;
  font-weight: 760;
  line-height: 1;
  text-align: center;
}

.score-cell.rest {
  color: #7f858d;
  font-size: 14px;
  font-weight: 760;
}

.score-cell.empty {
  min-width: 18px;
  background: repeating-linear-gradient(to right, #f4f5f7 0 1px, transparent 1px 100%);
  border: 1px dashed #e5e8ed;
}

.score-cell.active {
  background: var(--accent);
  color: #342600;
  box-shadow: 0 8px 18px rgba(225, 154, 52, 0.22);
}

.melody-line {
  min-height: 58px;
  display: flex;
  align-items: center;
  gap: 10px;
  overflow-x: auto;
  padding: 4px 0 10px;
  scrollbar-width: none;
}

.melody-line::-webkit-scrollbar {
  display: none;
}

.melody-note,
.draft-note {
  flex: 0 0 auto;
  min-width: 40px;
  height: 44px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: #f5f6f8;
  color: #24272c;
  font-size: 26px;
  font-weight: 760;
}

.melody-note.active {
  background: var(--accent);
  color: #342600;
  box-shadow: 0 8px 18px rgba(225, 154, 52, 0.22);
}

.practice-meta,
.preview-row,
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.practice-meta {
  color: var(--muted);
  font-size: 16px;
}

.compact-panel {
  padding: 18px;
}

.voice-title {
  margin: 0;
  font-size: 22px;
  font-weight: 780;
}

.text-action {
  min-height: 38px;
  border-radius: 999px;
  background: #fff4d1;
  color: #72500a;
  padding: 0 14px;
  font-size: 16px;
  font-weight: 700;
}

.preview-row {
  margin-top: 14px;
  color: var(--muted);
  font-size: 16px;
}

.preview-row strong {
  color: var(--ink);
}

.settings-panel {
  padding: 16px;
}

.segmented,
.duration-row {
  display: grid;
  gap: 8px;
}

.segmented {
  grid-template-columns: repeat(3, 1fr);
}

.segmented button,
.duration-row button {
  min-height: 42px;
  border-radius: 12px;
  background: #f2f3f5;
  color: #555a61;
  font-weight: 760;
}

.segmented button.active,
.duration-row button.active {
  background: var(--accent);
  color: #4f3705;
}

.rest-note {
  margin-top: 12px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.45;
}

.pill-row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}

.pill-row::-webkit-scrollbar {
  display: none;
}

.pill {
  flex: 0 0 auto;
  min-height: 46px;
  padding: 0 18px;
  color: #4f5359;
  font-size: 18px;
}

.pill.active {
  color: #2a2d31;
  background: var(--accent);
}

.panel-caret {
  display: grid;
  place-items: center;
  height: 32px;
  margin-bottom: -10px;
}

.panel-caret::before {
  content: "";
  width: 17px;
  height: 17px;
  border-right: 3px solid #bfc2c7;
  border-bottom: 3px solid #bfc2c7;
  transform: rotate(45deg);
}

.play-controls {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  margin-top: 18px;
}

.primary-action,
.secondary-action {
  min-height: 48px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 700;
}

.primary-action {
  background: #22262d;
  color: #fff;
}

.secondary-action {
  width: 96px;
  background: #fff4d1;
  color: #72500a;
}

.piano-dock {
  position: fixed;
  left: 50%;
  bottom: 0;
  width: min(100%, 480px);
  transform: translateX(-50%);
  background: #050505;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 20;
}

.mini-piano {
  height: 45px;
  display: flex;
  align-items: center;
  gap: 1px;
  padding: 7px 136px 6px 14px;
  overflow: hidden;
}

.mini-key {
  flex: 0 0 8px;
  height: 31px;
  background: linear-gradient(90deg, #dcdde0, #fff 42%, #aaa);
}

.mini-key.black {
  height: 28px;
  background: #1b1c1f;
}

.loop-button {
  position: absolute;
  right: 14px;
  top: 10px;
  min-width: 82px;
  height: 39px;
  border-radius: 8px;
  background: var(--accent);
  color: #6a4b13;
  font-size: 18px;
  font-weight: 700;
}

.keyboard {
  position: relative;
  height: 204px;
  display: flex;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  scrollbar-width: none;
}

.keyboard::-webkit-scrollbar {
  display: none;
}

.white-key {
  position: relative;
  flex: 0 0 78px;
  height: 100%;
  border: 1px solid #d5d7dc;
  border-bottom: 7px solid #d8d9dd;
  border-radius: 0 0 10px 10px;
  background: linear-gradient(90deg, #f5f6fa 0%, #fff 24%, #eef0f7 100%);
  color: #94979d;
  font-size: 21px;
  padding-top: 158px;
}

.white-key.active,
.mini-key.active {
  box-shadow: inset 0 0 0 4px rgba(246, 202, 83, 0.95);
}

.black-key {
  position: absolute;
  top: 0;
  z-index: 2;
  width: 46px;
  height: 116px;
  margin-left: -23px;
  border-radius: 0 0 10px 10px;
  background: linear-gradient(90deg, #030303, #27292e 42%, #050505 100%);
  box-shadow: 0 7px 10px rgba(0, 0, 0, 0.38);
}

.black-key.active {
  outline: 4px solid rgba(246, 202, 83, 0.95);
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  display: grid;
  align-items: end;
  background: rgba(0, 0, 0, 0.74);
  z-index: 40;
}

.scale-sheet {
  width: min(100%, 480px);
  max-height: 78vh;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 18px 18px 0 0;
  background: #fff;
  padding-bottom: calc(env(safe-area-inset-bottom) + 22px);
}

.sheet-header {
  display: grid;
  grid-template-columns: 48px 1fr 48px;
  align-items: center;
  min-height: 74px;
  border-bottom: 1px solid var(--line);
}

.sheet-title {
  margin: 0;
  text-align: center;
  font-size: 25px;
  font-weight: 780;
}

.scale-list {
  max-height: calc(78vh - 160px);
  overflow: auto;
}

.scale-row {
  display: grid;
  grid-template-columns: 92px 1fr;
  align-items: center;
  min-height: 66px;
  padding: 0 22px;
  border-bottom: 1px solid var(--line);
  background: #fff;
  text-align: left;
}

.melody-row {
  grid-template-columns: 104px 1fr;
}

.mini-melody {
  overflow: hidden;
  color: #2d2f33;
  font-size: 22px;
  font-weight: 680;
  letter-spacing: 1px;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.scale-row.active .mini-melody {
  color: var(--accent-strong);
}

.scale-row.active {
  color: var(--accent-strong);
}

.scale-name {
  font-size: 19px;
}

.scale-row .notation {
  font-size: 29px;
}

.sheet-footer {
  height: 76px;
  display: grid;
  place-items: center;
  color: #4e5359;
  font-size: 20px;
  cursor: pointer;
}

.editor-sheet {
  width: min(100%, 480px);
  max-height: 82vh;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 18px 18px 0 0;
  background: #fff;
  padding-bottom: calc(env(safe-area-inset-bottom) + 18px);
}

.editor-body {
  padding: 18px;
}

.editor-meter {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
  color: var(--muted);
  font-size: 15px;
  font-weight: 700;
}

.editor-grid {
  grid-template-columns: repeat(32, minmax(20px, 1fr));
  grid-auto-rows: 48px;
  max-height: 168px;
  padding: 12px;
  border: 1px dashed #dfe3e8;
  border-radius: 16px;
  background: #fbfcfd;
}

.editor-grid .score-cell {
  border: 1px solid transparent;
}

.editor-grid .score-cell:not(.empty):active {
  transform: scale(0.97);
}

.draft-line {
  min-height: 112px;
  display: flex;
  align-content: flex-start;
  flex-wrap: wrap;
  gap: 10px;
  padding: 14px;
  border: 1px dashed #dfe3e8;
  border-radius: 16px;
  background: #fbfcfd;
}

.draft-note {
  border: 2px solid transparent;
  background: #fff4d1;
}

.empty-draft {
  align-self: center;
  width: 100%;
  color: var(--muted);
  text-align: center;
  font-size: 17px;
}

.note-pad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.duration-row {
  grid-template-columns: repeat(4, 1fr);
  margin-top: 16px;
}

.duration-row button {
  display: grid;
  align-content: center;
  gap: 2px;
  font-size: 20px;
}

.duration-row small {
  font-size: 11px;
  font-weight: 700;
}

.note-chip {
  min-height: 50px;
  border-radius: 14px;
  background: #f3f4f6;
  color: #24272c;
  font-size: 24px;
  font-weight: 760;
}

.rest-chip {
  color: #6b7078;
}

.rest-row {
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;

function bindEvents() {

  bindAll("[data-meter]", "click", onMeterClick);

  for (var n = 0; n < noteNodes.length; n += 1) {
    noteNodes[n].addEventListener("click", onPianoNote, false);

function bindAll(selector, eventName, handler) {
  var nodes = document.querySelectorAll(selector);

}

function onActionClick(event) {
  var node = event.currentTarget;
  var action = node.getAttribute("data-action");

  if (action === "open-melodies") {
    melodySheetOpen = true;
    render();
  } else if (action === "close-sheet" && (event.target === node || hasClass(node, "icon-button"))) {
    melodySheetOpen = false;
    render();
  } else if (action === "open-editor") {
    melodySheetOpen = false;
    editorDraft = cloneEvents(selectedMelody().events);
    editorOpen = true;
    render();
  } else if (action === "close-editor" && (event.target === node || hasClass(node, "icon-button"))) {
    editorOpen = false;
    render();
  } else if (action === "tempo-down") {
    bpm = Math.max(50, bpm - 5);
    saveState();
    render();
  } else if (action === "tempo-up") {
    bpm = Math.min(180, bpm + 5);
    saveState();
    render();
  } else if (action === "cycle-direction") {
    var index = directionIndex();
    direction = directionOptions[(index + 1) % directionOptions.length].id;
    saveState();
    render();
  } else if (action === "toggle-play") {
    togglePractice();
  } else if (action === "clear-draft") {
    editorDraft = [];
    render();
  } else if (action === "delete-last") {
    editorDraft.pop();
    render();
  } else if (action === "save-melody") {
    saveDraftMelody();
  }
}

function onMelodyClick(event) {

  if (note) addDraftEvent({ label: note.label, offset: note.offset, beats: Number(selectedDuration), rest: false });
  render();
}

function onAddRest() {
  addDraftEvent({ label: "休", offset: 0, beats: Number(selectedDuration), rest: true });
  render();
}

function onRemoveNote(event) {
  editorDraft.splice(Number(event.currentTarget.getAttribute("data-remove-note")), 1);
  render();
}

function onDurationClick(event) {
  selectedDuration = Number(event.currentTarget.getAttribute("data-duration"));
  saveState();
  render();
}

function onMeterClick(event) {
  beatsPerBar = Number(event.currentTarget.getAttribute("data-meter"));
  trimDraftToGrid();
  saveState();
  render();
}

function onPianoNote(event) {
  event.preventDefault();
  startNote = event.currentTarget.getAttribute("data-note");
  stopPlayback();
  ensureAudio();
  if (hasLoadedSamples()) {
    playPianoNote(noteToMidi(startNote), 0.45, 0);
  } else {
    sampleStatus = "loading";
    preloadPianoSamples().then(function () {
      if (sampleStatus === "ready") playPianoNote(noteToMidi(startNote), 0.45, 0);
      render();
    });
  }
  saveState();
  render();
}

function addDraftEvent(item) {
  var max = beatsPerBar * 4;
  if (totalBeats(editorDraft) + item.beats <= max) editorDraft.push(item);
}

function trimDraftToGrid() {
  var max = beatsPerBar * 4;
  while (totalBeats(editorDraft) > max) editorDraft.pop();
}

function togglePractice() {
  if (sampleStatus === "loading") return;
  if (isPlaying) {
    stopPlayback();
    render();
  } else {
    startPractice();
  }
}

function startPractice() {
  var melody = selectedMelody();
  if (!melody.events.length) return;
  ensureAudio();
  if (!hasLoadedSamples()) {
    sampleStatus = "loading";
    render();
    preloadPianoSamples().then(function () {
      if (sampleStatus === "ready") startPractice();
      else render();
    });
    return;
  }
  clearTimers();
  isPlaying = true;
  var baseMidi = noteToMidi(startNote);
  scheduleRound(baseMidi);
  render();
}

function scheduleRound(baseMidi) {
  if (!isPlaying) return;
  var melody = selectedMelody();
  var beatMs = 60000 / bpm;
  var cursor = 0;
  var chord = majorTriad(baseMidi);

  setStageAt("prep", -1, chord, cursor);
  scheduleChord(chord, beatsPerBar * beatMs, cursor);
  cursor += beatsPerBar * beatMs;

  for (var i = 0; i < melody.events.length; i += 1) {
    scheduleEvent(melody.events[i], i, baseMidi, cursor);
    cursor += normalizeEvent(melody.events[i]).beats * beatMs;
  }

  setStageAt("closing", -1, chord, cursor);
  scheduleChord(chord, 2 * beatMs, cursor);
  cursor += 2 * beatMs;

  setStageAt("breath", -1, [], cursor);
  cursor += beatsPerBar * 2 * beatMs;

  playTimers.push(window.setTimeout(function () {
    var nextBase = nextBaseMidi(baseMidi, melody);
    if (nextBase === null) {
      stopPlayback();
      render();
      return;
    }
    scheduleRound(nextBase);
  }, cursor));
}

function scheduleEvent(event, index, baseMidi, delayMs) {
  var normalized = normalizeEvent(event);
  var beatMs = 60000 / bpm;
  playTimers.push(window.setTimeout(function () {
    if (!isPlaying) return;
    playStage = "melody";
    activeEventIndex = index;
    activeChord = [];
    if (normalized.rest) {
      activeNote = "";
      updateLiveState();
      return;
    }
    var midi = baseMidi + normalized.offset;
    playPianoNote(midi, normalized.beats * beatMs / 1000, 0);
    activeNote = midiToNote(midi);
    updateLiveState();
  }, delayMs));
}

function setStageAt(stage, eventIndex, chord, delayMs) {
  playTimers.push(window.setTimeout(function () {
    if (!isPlaying) return;
    playStage = stage;
    activeEventIndex = eventIndex;
    activeChord = chord || [];
    activeNote = "";
    updateLiveState();
  }, delayMs));
}

function scheduleChord(midis, durationMs, delayMs) {
  playTimers.push(window.setTimeout(function () {
    if (!isPlaying) return;
    playChord(midis, durationMs / 1000);
  }, delayMs));
}

function nextBaseMidi(baseMidi, melody) {
  var next = baseMidi;
  if (direction === "up") next += 1;
  if (direction === "down") next -= 1;
  if (next + maxOffset(melody) > noteToMidi("B4") || next < noteToMidi("A2")) return null;
  return next;
}

function stopPlayback() {
  clearTimers();
  isPlaying = false;
  activeNote = "";
  activeChord = [];
  activeEventIndex = -1;
  playStage = "";
}

function clearTimers() {
  for (var i = 0; i < playTimers.length; i += 1) window.clearTimeout(playTimers[i]);
  playTimers = [];
}

function saveDraftMelody() {
  if (!editorDraft.length) return;
  var edited = { id: "custom", name: "我的练声曲", events: cloneEvents(editorDraft) };
  var index = melodyIndexById("custom");
  if (index >= 0) melodies[index] = edited;
  else melodies.unshift(edited);
  selectedMelodyId = "custom";
  editorOpen = false;
  stopPlayback();
  saveState();
  render();
}

function selectedMelody() {
  var index = melodyIndexById(selectedMelodyId);
  return index >= 0 ? melodies[index] : melodies[0];
}

function loadState() {
  try {
    var savedText = window.localStorage ? window.localStorage.getItem(storageKey) : null;
    var saved = savedText ? JSON.parse(savedText) : null;
    if (saved && saved.melodies && saved.melodies.length) {
      saved.melodies = migrateMelodies(saved.melodies);
      return saved;
    }
  } catch (error) {}

  try {
    var oldText = window.localStorage ? window.localStorage.getItem("vocal-melodies") : null;
    var oldMelodies = oldText ? JSON.parse(oldText) : null;
    if (oldMelodies && oldMelodies.length) return { melodies: migrateMelodies(oldMelodies) };
  } catch (error2) {}

  return { melodies: defaultMelodies };
}

function saveState() {
  try {
    if (window.localStorage) {
      window.localStorage.setItem(storageKey, JSON.stringify({
        melodies: melodies,
        selectedMelodyId: selectedMelodyId,
        bpm: bpm,
        beatsPerBar: beatsPerBar,
        startNote: startNote,
        direction: direction,
        selectedDuration: selectedDuration
      }));
    }
  } catch (error) {}
}

function migrateMelodies(list) {
  var output = [];
  for (var i = 0; i < list.length; i += 1) {
    if (list[i].events) output.push({ id: list[i].id, name: list[i].name, events: cloneEvents(list[i].events) });
    else output.push({ id: list[i].id, name: list[i].name, events: cloneLegacyNotes(list[i].notes || []) });
  }
  return output.length ? output : defaultMelodies;
}

function cloneLegacyNotes(notes) {
  var events = [];
  for (var i = 0; i < notes.length; i += 1) {
    events.push({ label: notes[i].label, offset: notes[i].offset, beats: 0.5, rest: false });
  }
  return events;
}

function cloneEvents(events) {
  var copy = [];
  for (var i = 0; i < events.length; i += 1) {
    var item = normalizeEvent(events[i]);
    copy.push({ label: item.label, offset: item.offset, beats: item.beats, rest: item.rest });
  }
  return copy;
}

function buildEvents(labels, beats) {
  var events = [];
  for (var i = 0; i < labels.length; i += 1) {
    var note = solfegeByLabel(labels[i]);
    if (note) events.push({ label: note.label, offset: note.offset, beats: beats, rest: false });
  }
  return events;
}

function normalizeEvent(event) {
  return {
    label: event.label || "1",
    offset: Number(event.offset || 0),
    beats: Number(event.beats || 0.5),
    rest: !!event.rest
  };
}

function directionLabel() {
  return directionOptions[directionIndex()].label;
}

function directionIndex() {
  for (var i = 0; i < directionOptions.length; i += 1) {
    if (directionOptions[i].id === direction) return i;
  }
  return 0;
}

function meterLabel() {
  return beatsPerBar + "/4";
}

function solfegeByLabel(label) {
  for (var i = 0; i < solfege.length; i += 1) {
    if (solfege[i].label === label) return solfege[i];
  }
  return null;
}

function melodyIndexById(id) {
  for (var i = 0; i < melodies.length; i += 1) {
    if (melodies[i].id === id) return i;
  }
  return -1;
}

function melodyPreview(events) {
  var labels = [];
  for (var i = 0; i < events.length; i += 1) {
    var item = normalizeEvent(events[i]);
    labels.push(item.rest ? restLabel(item.beats) : item.label);
  }
  return labels.join(" ");
}

function melodySummary(events) {
  return formatBeat(totalBeats(events)) + " 拍";
}

function totalBeats(events) {
  var total = 0;
  for (var i = 0; i < events.length; i += 1) total += normalizeEvent(events[i]).beats;
  return total;
}

function formatBeat(value) {
  return value % 1 === 0 ? String(value) : String(value).replace(".5", "½");
}

function restLabel(beats) {
  if (beats === 0.5) return "♪休";
  if (beats === 1) return "♩休";
  if (beats === 2) return "𝅗𝅥休";
  if (beats === 4) return "𝅝休";
  return "休";
}

function sharpName(note) {
  return midiToNote(noteToMidi(note) + 1);
}

function maxOffset(melody) {
  var max = 0;
  for (var i = 0; i < melody.events.length; i += 1) {
    var item = normalizeEvent(melody.events[i]);
    if (!item.rest && item.offset > max) max = item.offset;
  }
  return max;
}

function ensureAudio() {
  var AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === "suspended" && audioCtx.resume) audioCtx.resume();
  preloadPianoSamples();
}

function playPianoNote(midi, duration, delay) {
  ensureAudio();
  if (!audioCtx) return;
  if (playSampledPiano(midi, duration, delay)) return;
}

function preloadPianoSamples() {
  if (!audioCtx) return Promise.resolve(false);
  if (hasLoadedSamples()) {
    sampleStatus = "ready";
    return Promise.resolve(true);
  }
  if (preloadPromise) return preloadPromise;
  sampleStatus = "loading";
  preloadPromise = Promise.allSettled(pianoSamples.map(loadPianoSample)).then(function () {
    sampleStatus = hasLoadedSamples() ? "ready" : "error";
    preloadPromise = null;
    render();
    return sampleStatus === "ready";
  });
  return preloadPromise;
}

function loadPianoSample(sample) {
  if (!audioCtx || sampleCache[sample.note]) return Promise.resolve(sampleCache[sample.note]);
  if (sampleLoading[sample.note]) return sampleLoading[sample.note];
  sampleLoading[sample.note] = window.fetch(sample.url)
    .then(function (response) {
      if (!response.ok) throw new Error("sample");
      return response.arrayBuffer();
    })
    .then(function (arrayBuffer) {
      return audioCtx.decodeAudioData(arrayBuffer);
    })
    .then(function (buffer) {
      sampleCache[sample.note] = buffer;
      sampleLoading[sample.note] = null;
      return buffer;
    })
    .catch(function () {
      sampleLoading[sample.note] = null;
      return null;
    });
  return sampleLoading[sample.note];
}

function hasLoadedSamples() {
  for (var i = 0; i < pianoSamples.length; i += 1) {
    if (sampleCache[pianoSamples[i].note]) return true;
  }
  return false;
}

function sampleStatusText() {
  if (sampleStatus === "loading") return "正在加载真实钢琴音色";
  if (sampleStatus === "error") return "钢琴采样加载失败，请换网络刷新";
  if (sampleStatus === "ready") return "真实干声三角钢琴采样";
  return "真实干声三角钢琴采样";
}

function playButtonLabel() {
  if (isPlaying) return "停止练声";
  if (sampleStatus === "loading") return "加载钢琴音色...";
  return "开始练声";
}

function playSampledPiano(midi, duration, delay) {
  var sample = nearestLoadedSample(midi);
  if (!sample) return false;
  var buffer = sampleCache[sample.note];
  if (!buffer) return false;
  var now = audioCtx.currentTime + (delay || 0);
  var source = audioCtx.createBufferSource();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  var release = Math.min(0.18, Math.max(0.06, duration * 0.22));

  source.buffer = buffer;
  source.playbackRate.setValueAtTime(Math.pow(2, (midi - sample.midi) / 12), now);
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(7600, now);
  filter.Q.setValueAtTime(0.2, now);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.linearRampToValueAtTime(0.86, now + 0.012);
  gain.gain.setValueAtTime(0.86, now + Math.max(0.03, duration - release));
  gain.gain.linearRampToValueAtTime(0.0001, now + duration + release);

  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  source.start(now);
  source.stop(now + duration + release + 0.05);
  return true;
}

function nearestLoadedSample(midi) {
  var best = null;
  var bestDistance = Infinity;
  for (var i = 0; i < pianoSamples.length; i += 1) {
    var item = pianoSamples[i];
    if (!sampleCache[item.note]) continue;
    var distance = Math.abs(item.midi - midi);
    if (distance < bestDistance) {
      best = item;
      bestDistance = distance;
    }
  }
  return best;
}

function playChord(midis, duration) {
  for (var i = 0; i < midis.length; i += 1) playPianoNote(midis[i], duration, i * 0.006);
}

function majorTriad(rootMidi) {
  return [rootMidi, rootMidi + 4, rootMidi + 7];
}

function updateLiveState() {
  var noteNodes = document.querySelectorAll(".score-cell");
  for (var i = 0; i < noteNodes.length; i += 1) {
    toggleClass(noteNodes[i], "active", i === activeEventIndex && playStage === "melody");
  }
  highlightActiveKey();
  updateStatusStrip();
}

function updateStatusStrip() {
  var nodes = document.querySelectorAll(".status-strip span");
  var stages = ["prep", "melody", "closing", "breath"];
  for (var i = 0; i < nodes.length; i += 1) toggleClass(nodes[i], "active", stages[i] === playStage);
}

function highlightActiveKey() {
  var nodes = document.querySelectorAll("[data-note]");
  for (var i = 0; i < nodes.length; i += 1) {
    var note = nodes[i].getAttribute("data-note");
    toggleClass(nodes[i], "active", isKeyActive(note));
  }
}

function isKeyActive(note) {
  if (note === startNote || note === activeNote) return true;
  var midi = noteToMidi(note);
  for (var i = 0; i < activeChord.length; i += 1) {
    if (activeChord[i] === midi) return true;
  }
  return false;
}

function noteToMidi(note) {
  var match = /^([A-G])(#?)(\d)$/.exec(note);
  if (!match) return 60;
  var offsets = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
  return (Number(match[3]) + 1) * 12 + offsets[match[1]] + (match[2] ? 1 : 0);
}

function midiToNote(midi) {
  var octave = Math.floor(midi / 12) - 1;
  var name = noteNames[((midi % 12) + 12) % 12];
  return name + octave;
}

function scrollStartNoteIntoView() {
  var key = document.querySelector('[data-note="' + startNote + '"]');
  if (!key) return;
  try {
    key.scrollIntoView({ behavior: "auto", inline: "center", block: "nearest" });
  } catch (error) {
    try {
      key.scrollIntoView(false);
    } catch (innerError) {}
  }
}

function hasClass(node, className) {
  return (" " + node.className + " ").indexOf(" " + className + " ") >= 0;
}

function toggleClass(node, className, enabled) {
  if (node.classList) {
    node.classList.toggle(className, enabled);
    return;
  }
  var exists = hasClass(node, className);
  if (enabled && !exists) node.className += " " + className;
  if (!enabled && exists) node.className = (" " + node.className + " ").replace(" " + className + " ", " ").replace(/^\s+|\s+$/g, "");
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", render, false);
} else {
  render();
}

</script>
