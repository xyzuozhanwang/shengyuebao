<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="声乐宝" />
    <title>声乐宝</title>
    <style>
:root {
  --ink: #2d2f33;
  --muted: #777b83;
  --line: #edf0f3;
  --bg: #f7f7f7;
  --card: #ffffff;
  --accent: #f6ca53;
  --accent-strong: #e19a34;
  --shadow: 0 12px 28px rgba(31, 34, 39, 0.08);
  --radius: 20px;
  color-scheme: light;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: #fff;
  color: var(--ink);
}

button {
  border: 0;
  color: inherit;
  font: inherit;
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
  min-height: 100dvh;
  background: #fff;
  overflow-x: hidden;
}

.phone-page {
  min-height: 100vh;
  min-height: 100dvh;
  padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 24px);
  margin: 0 auto;
  max-width: 480px;
}

.practice-page {
  background: var(--bg);
  padding-bottom: calc(env(safe-area-inset-bottom) + 282px);
}

.topbar {
  display: grid;
  grid-template-columns: 48px 1fr 48px;
  align-items: center;
  min-height: 62px;
}

.title {
  margin: 0;
  text-align: center;
  font-size: 25px;
  font-weight: 760;
  letter-spacing: 0;
}

.icon-button {
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  background: transparent;
  border-radius: 50%;
}

.user-icon,
.vip-icon,
.back-icon,
.close-icon,
.edit-icon {
  position: relative;
  width: 30px;
  height: 30px;
}

.user-icon::before {
  content: "";
  position: absolute;
  left: 8px;
  top: 3px;
  width: 13px;
  height: 13px;
  border: 3px solid #26292e;
  border-radius: 50%;
}

.user-icon::after {
  content: "";
  position: absolute;
  left: 3px;
  bottom: 2px;
  width: 24px;
  height: 15px;
  border: 3px solid #26292e;
  border-bottom: 0;
  border-radius: 18px 18px 0 0;
}

.vip-icon {
  transform: rotate(45deg);
  border: 3px solid #26292e;
  border-radius: 6px;
}

.vip-icon::after {
  content: "V";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  transform: rotate(-45deg);
  font-weight: 800;
  font-size: 17px;
}

.back-icon::before,
.back-icon::after {
  content: "";
  position: absolute;
  left: 7px;
  top: 14px;
  width: 22px;
  height: 3px;
  background: #292c31;
  border-radius: 10px;
  transform-origin: left center;
}

.back-icon::before {
  transform: rotate(45deg);
}

.back-icon::after {
  transform: rotate(-45deg);
}

.close-icon::before,
.close-icon::after {
  content: "";
  position: absolute;
  left: 4px;
  top: 14px;
  width: 24px;
  height: 3px;
  background: #777b83;
  border-radius: 999px;
}

.close-icon::before {
  transform: rotate(45deg);
}

.close-icon::after {
  transform: rotate(-45deg);
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-top: 16px;
}

.feature-card {
  min-height: 154px;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  padding: 18px 14px;
  text-align: left;
  background: var(--tone);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
}

.feature-card h2 {
  margin: 0 0 8px;
  font-size: clamp(24px, 7vw, 31px);
  line-height: 1.06;
  font-weight: 800;
  letter-spacing: 0;
}

.feature-card p {
  margin: 0;
  max-width: 8em;
  color: #6f747b;
  font-size: 17px;
  line-height: 1.45;
}

.feature-art {
  position: absolute;
  right: 12px;
  bottom: 14px;
  width: 76px;
  height: 66px;
  filter: drop-shadow(0 12px 10px rgba(151, 112, 59, 0.18));
}

.art-card {
  background: rgba(255, 255, 255, 0.78);
  border-radius: 8px;
  box-shadow: 12px -7px 0 rgba(255, 255, 255, 0.48);
}

.art-staff::before,
.art-score::before,
.art-chord::before {
  content: "";
  position: absolute;
  inset: 16px 10px;
  background: repeating-linear-gradient(to bottom, #d7cdb8 0 1px, transparent 1px 11px);
}

.art-staff::after {
  content: "";
  position: absolute;
  left: 16px;
  top: 20px;
  width: 48px;
  height: 29px;
  border: 3px solid var(--accent-strong);
  border-top-color: transparent;
  clip-path: polygon(0 40%, 25% 45%, 25% 18%, 52% 20%, 52% 78%, 76% 73%, 76% 42%, 100% 38%, 100% 100%, 0 100%);
}

.art-notes::before {
  content: "♫";
  position: absolute;
  left: 17px;
  top: 8px;
  font-size: 43px;
  color: #ee9242;
}

.art-video {
  border: 7px solid #64866e;
  background: linear-gradient(160deg, #446f5d, #b9d8c3);
}

.art-video::before {
  content: "♪  ♫";
  position: absolute;
  left: 10px;
  top: 4px;
  color: #fff;
  font-size: 18px;
}

.art-video::after {
  content: "";
  position: absolute;
  left: 18px;
  bottom: 8px;
  width: 42px;
  height: 34px;
  background: radial-gradient(circle at 14px 10px, #1e2530 0 7px, transparent 8px), radial-gradient(circle at 31px 12px, #f9e6d9 0 8px, transparent 9px), linear-gradient(90deg, #fff 0 47%, #f7b5a5 48% 100%);
  border-radius: 7px;
}

.art-score::after {
  content: "";
  position: absolute;
  left: 17px;
  top: 18px;
  width: 43px;
  height: 31px;
  background: repeating-linear-gradient(to right, #2d2f33 0 2px, transparent 2px 7px);
  opacity: 0.45;
  clip-path: polygon(0 8%, 100% 8%, 100% 20%, 0 20%, 0 38%, 100% 38%, 100% 50%, 0 50%, 0 68%, 100% 68%, 100% 80%, 0 80%);
}

.art-piano {
  height: 58px;
  bottom: 18px;
  border-radius: 23px 23px 9px 9px;
  background: #142034;
}

.art-piano::before {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 5px;
  height: 34px;
  background: repeating-linear-gradient(to right, #fff 0 12px, #d9d9dc 12px 14px);
  border-radius: 0 0 5px 5px;
}

.art-piano::after {
  content: "";
  position: absolute;
  left: 18px;
  top: 22px;
  width: 8px;
  height: 24px;
  background: #111;
  box-shadow: 14px 0 #111, 42px 0 #111;
  border-radius: 0 0 4px 4px;
}

.art-tools::before {
  content: "";
  position: absolute;
  right: 17px;
  bottom: 2px;
  width: 32px;
  height: 64px;
  background: linear-gradient(#fff, #e9eef4);
  border: 5px solid #1d2230;
  border-radius: 12px 12px 5px 5px;
  clip-path: polygon(35% 0, 65% 0, 100% 100%, 0 100%);
}

.art-tools::after {
  content: "♩";
  position: absolute;
  left: 5px;
  top: 8px;
  width: 33px;
  height: 33px;
  display: grid;
  place-items: center;
  color: #e58b3b;
  background: #fffaf0;
  border-radius: 50%;
  transform: rotate(-18deg);
}

.art-ear::before {
  content: "";
  position: absolute;
  right: 10px;
  bottom: 0;
  width: 46px;
  height: 58px;
  background: #f7f7f7;
  border-radius: 24px 24px 10px 10px;
}

.art-ear::after {
  content: "♪♪";
  position: absolute;
  right: 46px;
  top: 9px;
  color: #1f2430;
  background: #fff;
  border-radius: 6px;
  padding: 4px 7px;
  font-size: 16px;
}

.art-chord::after {
  content: "C  F  G";
  position: absolute;
  left: 13px;
  bottom: 9px;
  width: 50px;
  color: #999;
  font-size: 13px;
  line-height: 1.5;
  text-align: center;
  background: linear-gradient(90deg, #eceff3 0 31%, #f7eef0 32% 64%, #f0f0eb 65%);
}

.panel {
  margin-top: 16px;
  padding: 22px 18px;
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: var(--shadow);
}

.melody-panel {
  min-height: 150px;
}

.scale-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}

.scale-select,
.round-control,
.pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: #f3f3f3;
  white-space: nowrap;
}

.scale-select {
  gap: 7px;
  padding: 0;
  background: transparent;
  font-size: 23px;
  font-weight: 800;
}

.chevron-dot,
.round-control {
  width: 28px;
  height: 28px;
  background: var(--accent);
  font-weight: 850;
}

.chevron-dot::before {
  content: "";
  width: 9px;
  height: 9px;
  border-right: 3px solid #323438;
  border-bottom: 3px solid #323438;
  transform: translateY(-2px) rotate(45deg);
}

.tempo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
}

.score {
  display: flex;
  align-items: end;
  gap: 10px;
  min-height: 56px;
  overflow-x: auto;
  scrollbar-width: none;
}

.score::-webkit-scrollbar {
  display: none;
}

.tonic-stack {
  display: grid;
  gap: 1px;
  padding-bottom: 2px;
  font-size: 21px;
  line-height: 1;
}

.notation {
  min-width: max-content;
  font-size: 38px;
  line-height: 1.08;
  letter-spacing: 0;
  font-weight: 620;
}

.notation .bar {
  color: #202328;
  padding: 0 3px;
}

.notation .dash {
  padding: 0 18px;
}

.notation .under {
  display: inline-block;
  border-bottom: 2px solid currentColor;
  line-height: 0.92;
}

.melody-line {
  min-height: 58px;
  display: flex;
  align-items: center;
  gap: 10px;
  overflow-x: auto;
  padding: 4px 0 10px;
  scrollbar-width: none;
}

.melody-line::-webkit-scrollbar {
  display: none;
}

.melody-note,
.draft-note {
  flex: 0 0 auto;
  min-width: 40px;
  height: 44px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: #f5f6f8;
  color: #24272c;
  font-size: 26px;
  font-weight: 760;
}

.melody-note.active {
  background: var(--accent);
  color: #342600;
  box-shadow: 0 8px 18px rgba(225, 154, 52, 0.22);
}

.practice-meta,
.preview-row,
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.practice-meta {
  color: var(--muted);
  font-size: 16px;
}

.compact-panel {
  padding: 18px;
}

.voice-title {
  margin: 0;
  font-size: 22px;
  font-weight: 780;
}

.text-action {
  min-height: 38px;
  border-radius: 999px;
  background: #fff4d1;
  color: #72500a;
  padding: 0 14px;
  font-size: 16px;
  font-weight: 700;
}

.preview-row {
  margin-top: 14px;
  color: var(--muted);
  font-size: 16px;
}

.preview-row strong {
  color: var(--ink);
}

.pill-row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}

.pill-row::-webkit-scrollbar {
  display: none;
}

.pill {
  flex: 0 0 auto;
  min-height: 46px;
  padding: 0 18px;
  color: #4f5359;
  font-size: 18px;
}

.pill.active {
  color: #2a2d31;
  background: var(--accent);
}

.panel-caret {
  display: grid;
  place-items: center;
  height: 32px;
  margin-bottom: -10px;
}

.panel-caret::before {
  content: "";
  width: 17px;
  height: 17px;
  border-right: 3px solid #bfc2c7;
  border-bottom: 3px solid #bfc2c7;
  transform: rotate(45deg);
}

.play-controls {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  margin-top: 18px;
}

.primary-action,
.secondary-action {
  min-height: 48px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 700;
}

.primary-action {
  background: #22262d;
  color: #fff;
}

.secondary-action {
  width: 96px;
  background: #fff4d1;
  color: #72500a;
}

.piano-dock {
  position: fixed;
  left: 50%;
  bottom: 0;
  width: min(100%, 480px);
  transform: translateX(-50%);
  background: #050505;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 20;
}

.mini-piano {
  height: 45px;
  display: flex;
  align-items: center;
  gap: 1px;
  padding: 7px 136px 6px 14px;
  overflow: hidden;
}

.mini-key {
  flex: 0 0 8px;
  height: 31px;
  background: linear-gradient(90deg, #dcdde0, #fff 42%, #aaa);
}

.mini-key.black {
  height: 28px;
  background: #1b1c1f;
}

.loop-button {
  position: absolute;
  right: 14px;
  top: 10px;
  min-width: 82px;
  height: 39px;
  border-radius: 8px;
  background: var(--accent);
  color: #6a4b13;
  font-size: 18px;
  font-weight: 700;
}

.keyboard {
  position: relative;
  height: 204px;
  display: flex;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  scrollbar-width: none;
}

.keyboard::-webkit-scrollbar {
  display: none;
}

.white-key {
  position: relative;
  flex: 0 0 78px;
  height: 100%;
  border: 1px solid #d5d7dc;
  border-bottom: 7px solid #d8d9dd;
  border-radius: 0 0 10px 10px;
  background: linear-gradient(90deg, #f5f6fa 0%, #fff 24%, #eef0f7 100%);
  color: #94979d;
  font-size: 21px;
  padding-top: 158px;
}

.white-key.active,
.mini-key.active {
  box-shadow: inset 0 0 0 4px rgba(246, 202, 83, 0.95);
}

.black-key {
  position: absolute;
  top: 0;
  z-index: 2;
  width: 46px;
  height: 116px;
  margin-left: -23px;
  border-radius: 0 0 10px 10px;
  background: linear-gradient(90deg, #030303, #27292e 42%, #050505 100%);
  box-shadow: 0 7px 10px rgba(0, 0, 0, 0.38);
}

.black-key.active {
  outline: 4px solid rgba(246, 202, 83, 0.95);
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  display: grid;
  align-items: end;
  background: rgba(0, 0, 0, 0.74);
  z-index: 40;
}

.scale-sheet {
  width: min(100%, 480px);
  max-height: 78vh;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 18px 18px 0 0;
  background: #fff;
  padding-bottom: calc(env(safe-area-inset-bottom) + 22px);
}

.sheet-header {
  display: grid;
  grid-template-columns: 48px 1fr 48px;
  align-items: center;
  min-height: 74px;
  border-bottom: 1px solid var(--line);
}

.sheet-title {
  margin: 0;
  text-align: center;
  font-size: 25px;
  font-weight: 780;
}

.scale-list {
  max-height: calc(78vh - 160px);
  overflow: auto;
}

.scale-row {
  display: grid;
  grid-template-columns: 92px 1fr;
  align-items: center;
  min-height: 66px;
  padding: 0 22px;
  border-bottom: 1px solid var(--line);
  background: #fff;
  text-align: left;
}

.melody-row {
  grid-template-columns: 104px 1fr;
}

.mini-melody {
  overflow: hidden;
  color: #2d2f33;
  font-size: 26px;
  font-weight: 680;
  letter-spacing: 2px;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.scale-row.active .mini-melody {
  color: var(--accent-strong);
}

.scale-row.active {
  color: var(--accent-strong);
}

.scale-name {
  font-size: 19px;
}

.scale-row .notation {
  font-size: 29px;
}

.sheet-footer {
  height: 76px;
  display: grid;
  place-items: center;
  color: #4e5359;
  font-size: 20px;
  cursor: pointer;
}

.editor-sheet {
  width: min(100%, 480px);
  max-height: 82vh;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 18px 18px 0 0;
  background: #fff;
  padding-bottom: calc(env(safe-area-inset-bottom) + 18px);
}

.editor-body {
  padding: 18px;
}

.draft-line {
  min-height: 112px;
  display: flex;
  align-content: flex-start;
  flex-wrap: wrap;
  gap: 10px;
  padding: 14px;
  border: 1px dashed #dfe3e8;
  border-radius: 16px;
  background: #fbfcfd;
}

.draft-note {
  border: 2px solid transparent;
  background: #fff4d1;
}

.empty-draft {
  align-self: center;
  width: 100%;
  color: var(--muted);
  text-align: center;
  font-size: 17px;
}

.note-pad {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.note-chip {
  min-height: 50px;
  border-radius: 14px;
  background: #f3f4f6;
  color: #24272c;
  font-size: 24px;
  font-weight: 760;
}

.note-chip:active,
.draft-note:active {
  transform: scale(0.97);
}

.editor-actions {
  display: grid;
  grid-template-columns: 116px 1fr;
  gap: 12px;
  margin-top: 16px;
}

.secondary-action.wide {
  width: auto;
}

.edit-icon::before {
  content: "";
  position: absolute;
  left: 7px;
  top: 6px;
  width: 16px;
  height: 5px;
  border: 3px solid #7b8086;
  transform: rotate(-45deg);
}

.edit-icon::after {
  content: "";
  position: absolute;
  left: 4px;
  bottom: 5px;
  width: 23px;
  height: 3px;
  background: #7b8086;
}

.placeholder {
  padding-top: 52px;
  text-align: center;
}

.placeholder-card {
  margin-top: 28px;
  padding: 26px 18px;
  border-radius: var(--radius);
  background: #fff;
  box-shadow: var(--shadow);
  color: var(--muted);
  line-height: 1.7;
}

@media (max-width: 360px) {
  .feature-card {
    min-height: 142px;
    padding: 16px 12px;
  }

  .feature-card p {
    font-size: 15px;
  }

  .feature-art {
    transform: scale(0.86);
    transform-origin: right bottom;
  }

  .notation {
    font-size: 33px;
  }
}

</style>
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite">
      <section class="phone-page practice-page">
        <header class="topbar">
          <span></span>
          <h1 class="title">声乐宝</h1>
          <span></span>
        </header>
        <section class="panel">正在打开练声工具...</section>
      </section>
    </main>
    <script>
var app = document.getElementById("app");

var noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
var whiteNotes = ["A2", "B2", "C3", "D3", "E3", "F3", "G3", "A3", "B3", "C4", "D4", "E4", "F4", "G4", "A4", "B4"];
var blackAfter = { A: true, C: true, D: true, F: true, G: true };
var directionOptions = [
  { id: "up", label: "上行" },
  { id: "down", label: "下行" },
  { id: "repeat", label: "重复" }
];
var solfege = [
  { label: "1", offset: 0 },
  { label: "2", offset: 2 },
  { label: "3", offset: 4 },
  { label: "4", offset: 5 },
  { label: "5", offset: 7 },
  { label: "6", offset: 9 },
  { label: "7", offset: 11 },
  { label: "i", offset: 12 }
];
var defaultMelodies = [
  {
    id: "classic",
    name: "开嗓上行",
    notes: [
      { label: "1", offset: 0 },
      { label: "2", offset: 2 },
      { label: "3", offset: 4 },
      { label: "4", offset: 5 },
      { label: "5", offset: 7 },
      { label: "4", offset: 5 },
      { label: "3", offset: 4 },
      { label: "2", offset: 2 },
      { label: "1", offset: 0 }
    ]
  },
  {
    id: "triad",
    name: "三和弦",
    notes: [
      { label: "1", offset: 0 },
      { label: "3", offset: 4 },
      { label: "5", offset: 7 },
      { label: "i", offset: 12 },
      { label: "5", offset: 7 },
      { label: "3", offset: 4 },
      { label: "1", offset: 0 }
    ]
  },
  {
    id: "hum",
    name: "轻哼鸣",
    notes: [
      { label: "1", offset: 0 },
      { label: "3", offset: 4 },
      { label: "2", offset: 2 },
      { label: "4", offset: 5 },
      { label: "3", offset: 4 },
      { label: "5", offset: 7 },
      { label: "4", offset: 5 },
      { label: "2", offset: 2 },
      { label: "1", offset: 0 }
    ]
  }
];

var melodies = loadMelodies();
var selectedMelodyId = melodies[0].id;
var editorDraft = cloneNotes(selectedMelody().notes);
var bpm = 130;
var startNote = "C3";
var direction = "up";
var isPlaying = false;
var activeNote = "";
var melodySheetOpen = false;
var editorOpen = false;
var audioCtx = null;
var playTimer = null;
var currentNoteIndex = -1;

function render() {
  if (!app) return;
  app.innerHTML = practiceTemplate();
  bindEvents();
  scrollStartNoteIntoView();
}

function practiceTemplate() {
  var melody = selectedMelody();
  var notesHtml = "";
  for (var i = 0; i < melody.notes.length; i += 1) {
    notesHtml += '<span class="melody-note ' + (i === currentNoteIndex ? "active" : "") + '">' + melody.notes[i].label + "</span>";
  }

  return '' +
    '<section class="phone-page practice-page">' +
      '<header class="topbar"><span></span><h1 class="title">声乐宝</h1><span></span></header>' +
      '<section class="panel melody-panel">' +
        '<div class="scale-toolbar">' +
          '<button class="scale-select" data-action="open-melodies">' + melody.name + '<span class="chevron-dot"></span></button>' +
          '<div class="tempo">' +
            '<span>速度</span>' +
            '<button class="round-control" data-action="tempo-down" aria-label="减慢">-</button>' +
            '<span>' + bpm + 'BPM</span>' +
            '<button class="round-control" data-action="tempo-up" aria-label="加快">+</button>' +
          '</div>' +
        '</div>' +
        '<div class="melody-line" aria-label="当前练声旋律">' + notesHtml + '</div>' +
        '<div class="practice-meta"><span>起唱音 ' + startNote + '</span><span>' + directionLabel() + '练习</span></div>' +
      '</section>' +
      '<section class="panel compact-panel">' +
        '<div class="section-head"><h2 class="voice-title">练声曲编辑</h2><button class="text-action" data-action="open-editor">编辑旋律</button></div>' +
        '<div class="preview-row"><span>按简谱写一句旋律</span><strong>' + melody.notes.length + ' 个音</strong></div>' +
      '</section>' +
      '<div class="play-controls">' +
        '<button class="primary-action" data-action="toggle-play">' + (isPlaying ? "停止练声" : "开始练声") + '</button>' +
        '<button class="secondary-action" data-action="open-editor">编辑</button>' +
      '</div>' +
      pianoTemplate() +
      (melodySheetOpen ? melodySheetTemplate() : "") +
      (editorOpen ? editorTemplate() : "") +
    '</section>';
}

function pianoTemplate() {
  var mini = "";
  for (var i = 0; i < 52; i += 1) {
    mini += '<span class="mini-key ' + (i % 7 === 1 || i % 7 === 4 ? "black" : "") + '"></span>';
  }

  var left = 78;
  var keys = "";
  for (var j = 0; j < whiteNotes.length; j += 1) {
    var note = whiteNotes[j];
    var letter = note.charAt(0);
    var sharpNote = sharpName(note);
    if (blackAfter[letter] && j < whiteNotes.length - 1) {
      keys += '<button class="black-key ' + (activeNote === sharpNote || startNote === sharpNote ? "active" : "") + '" style="left:' + left + 'px" data-note="' + sharpNote + '" aria-label="' + sharpNote + '"></button>';
    }
    keys += '<button class="white-key ' + (activeNote === note || startNote === note ? "active" : "") + '" data-note="' + note + '">' + note + '</button>';
    left += 78;
  }

  return '' +
    '<section class="piano-dock" aria-label="钢琴键盘">' +
      '<div class="mini-piano">' + mini + '</div>' +
      '<button class="loop-button" data-action="cycle-direction">' + directionLabel() + '</button>' +
      '<div class="keyboard">' + keys + '</div>' +
    '</section>';
}

function melodySheetTemplate() {
  var rows = "";
  for (var i = 0; i < melodies.length; i += 1) {
    var melody = melodies[i];
    var labels = [];
    for (var j = 0; j < melody.notes.length; j += 1) labels.push(melody.notes[j].label);
    rows += '' +
      '<button class="scale-row melody-row ' + (melody.id === selectedMelodyId ? "active" : "") + '" data-melody="' + melody.id + '">' +
        '<span class="scale-name">' + melody.name + '</span>' +
        '<span class="mini-melody">' + labels.join(" ") + '</span>' +
      '</button>';
  }

  return '' +
    '<div class="modal-backdrop" data-action="close-sheet">' +
      '<section class="scale-sheet" role="dialog" aria-modal="true" aria-label="练声曲">' +
        '<header class="sheet-header"><span></span><h2 class="sheet-title">选择练声曲</h2><button class="icon-button" data-action="close-sheet" aria-label="关闭"><span class="close-icon"></span></button></header>' +
        '<div class="scale-list">' + rows + '</div>' +
        '<footer class="sheet-footer" data-action="open-editor"><span class="edit-icon"></span>编辑当前旋律</footer>' +
      '</section>' +
    '</div>';
}

function editorTemplate() {
  var draft = "";
  if (editorDraft.length) {
    for (var i = 0; i < editorDraft.length; i += 1) {
      draft += '<button class="draft-note" data-remove-note="' + i + '">' + editorDraft[i].label + '</button>';
    }
  } else {
    draft = '<span class="empty-draft">点下面的音符组成一条练声旋律</span>';
  }

  var pad = "";
  for (var j = 0; j < solfege.length; j += 1) {
    pad += '<button class="note-chip" data-add-note="' + solfege[j].label + '">' + solfege[j].label + '</button>';
  }

  return '' +
    '<div class="modal-backdrop" data-action="close-editor">' +
      '<section class="editor-sheet" role="dialog" aria-modal="true" aria-label="编辑旋律">' +
        '<header class="sheet-header"><button class="text-action" data-action="clear-draft">清空</button><h2 class="sheet-title">编辑旋律</h2><button class="icon-button" data-action="close-editor" aria-label="关闭"><span class="close-icon"></span></button></header>' +
        '<div class="editor-body">' +
          '<div class="draft-line">' + draft + '</div>' +
          '<div class="note-pad">' + pad + '</div>' +
          '<div class="editor-actions"><button class="secondary-action wide" data-action="delete-last">删除一个</button><button class="primary-action" data-action="save-melody">保存旋律</button></div>' +
        '</div>' +
      '</section>' +
    '</div>';
}

function bindEvents() {
  var actionNodes = document.querySelectorAll("[data-action]");
  for (var i = 0; i < actionNodes.length; i += 1) {
    actionNodes[i].addEventListener("click", onActionClick, false);
  }

  var melodyNodes = document.querySelectorAll("[data-melody]");
  for (var j = 0; j < melodyNodes.length; j += 1) {
    melodyNodes[j].addEventListener("click", onMelodyClick, false);
  }

  var addNodes = document.querySelectorAll("[data-add-note]");
  for (var k = 0; k < addNodes.length; k += 1) {
    addNodes[k].addEventListener("click", onAddNote, false);
  }

  var removeNodes = document.querySelectorAll("[data-remove-note]");
  for (var r = 0; r < removeNodes.length; r += 1) {
    removeNodes[r].addEventListener("click", onRemoveNote, false);
  }

  var noteNodes = document.querySelectorAll("[data-note]");
  for (var n = 0; n < noteNodes.length; n += 1) {
    noteNodes[n].addEventListener("click", onPianoNote, false);
    if (window.PointerEvent) noteNodes[n].addEventListener("pointerdown", onPianoNote, false);
  }
}

function onActionClick(event) {
  var node = event.currentTarget;
  var action = node.getAttribute("data-action");

  if (action === "open-melodies") {
    melodySheetOpen = true;
    render();
  } else if (action === "close-sheet" && (event.target === node || hasClass(node, "icon-button"))) {
    melodySheetOpen = false;
    render();
  } else if (action === "open-editor") {
    melodySheetOpen = false;
    editorDraft = cloneNotes(selectedMelody().notes);
    editorOpen = true;
    render();
  } else if (action === "close-editor" && (event.target === node || hasClass(node, "icon-button"))) {
    editorOpen = false;
    render();
  } else if (action === "tempo-down") {
    bpm = Math.max(60, bpm - 5);
    render();
  } else if (action === "tempo-up") {
    bpm = Math.min(220, bpm + 5);
    render();
  } else if (action === "cycle-direction") {
    var index = directionIndex();
    direction = directionOptions[(index + 1) % directionOptions.length].id;
    render();
  } else if (action === "toggle-play") {
    togglePractice();
  } else if (action === "clear-draft") {
    editorDraft = [];
    render();
  } else if (action === "delete-last") {
    editorDraft.pop();
    render();
  } else if (action === "save-melody") {
    saveDraftMelody();
  }
}

function onMelodyClick(event) {
  selectedMelodyId = event.currentTarget.getAttribute("data-melody");
  melodySheetOpen = false;
  stopPlayback();
  render();
}

function onAddNote(event) {
  var label = event.currentTarget.getAttribute("data-add-note");
  var note = solfegeByLabel(label);
  if (note && editorDraft.length < 32) editorDraft.push({ label: note.label, offset: note.offset });
  render();
}

function onRemoveNote(event) {
  editorDraft.splice(Number(event.currentTarget.getAttribute("data-remove-note")), 1);
  render();
}

function onPianoNote(event) {
  event.preventDefault();
  startNote = event.currentTarget.getAttribute("data-note");
  stopPlayback();
  playNote(startNote, 0.5);
  render();
}

function togglePractice() {
  if (isPlaying) {
    stopPlayback();
    render();
  } else {
    startPractice();
  }
}

function startPractice() {
  var melody = selectedMelody();
  if (!melody.notes.length) return;
  ensureAudio();
  isPlaying = true;

  var baseMidi = noteToMidi(startNote);
  var noteIndex = 0;
  var beatMs = 60000 / bpm;

  function tick() {
    var melodyNote = melody.notes[noteIndex];
    var midi = baseMidi + melodyNote.offset;
    currentNoteIndex = noteIndex;
    playMidi(midi, Math.min(0.48, beatMs / 1000 - 0.035));
    updateLiveState(midi);

    noteIndex += 1;
    if (noteIndex >= melody.notes.length) {
      noteIndex = 0;
      if (direction === "up") baseMidi += 1;
      if (direction === "down") baseMidi -= 1;
      if (baseMidi + maxOffset(melody) > noteToMidi("B4") || baseMidi < noteToMidi("A2")) {
        stopPlayback();
        render();
        return;
      }
    }

    playTimer = window.setTimeout(tick, beatMs);
  }

  tick();
  render();
}

function stopPlayback() {
  if (playTimer) {
    window.clearTimeout(playTimer);
    playTimer = null;
  }
  isPlaying = false;
  activeNote = "";
  currentNoteIndex = -1;
}

function saveDraftMelody() {
  if (!editorDraft.length) return;
  var edited = { id: "custom", name: "我的练声曲", notes: cloneNotes(editorDraft) };
  var index = melodyIndexById("custom");
  if (index >= 0) melodies[index] = edited;
  else melodies.unshift(edited);
  selectedMelodyId = "custom";
  saveMelodies();
  editorOpen = false;
  stopPlayback();
  render();
}

function selectedMelody() {
  var index = melodyIndexById(selectedMelodyId);
  return index >= 0 ? melodies[index] : melodies[0];
}

function loadMelodies() {
  try {
    var savedText = window.localStorage ? window.localStorage.getItem("vocal-melodies") : null;
    var saved = savedText ? JSON.parse(savedText) : null;
    if (saved && saved.length) return saved;
  } catch (error) {}
  return defaultMelodies;
}

function saveMelodies() {
  try {
    if (window.localStorage) window.localStorage.setItem("vocal-melodies", JSON.stringify(melodies));
  } catch (error) {}
}

function cloneNotes(notes) {
  var copy = [];
  for (var i = 0; i < notes.length; i += 1) {
    copy.push({ label: notes[i].label, offset: notes[i].offset });
  }
  return copy;
}

function directionLabel() {
  return directionOptions[directionIndex()].label;
}

function directionIndex() {
  for (var i = 0; i < directionOptions.length; i += 1) {
    if (directionOptions[i].id === direction) return i;
  }
  return 0;
}

function solfegeByLabel(label) {
  for (var i = 0; i < solfege.length; i += 1) {
    if (solfege[i].label === label) return solfege[i];
  }
  return null;
}

function melodyIndexById(id) {
  for (var i = 0; i < melodies.length; i += 1) {
    if (melodies[i].id === id) return i;
  }
  return -1;
}

function sharpName(note) {
  return midiToNote(noteToMidi(note) + 1);
}

function maxOffset(melody) {
  var max = 0;
  for (var i = 0; i < melody.notes.length; i += 1) {
    if (melody.notes[i].offset > max) max = melody.notes[i].offset;
  }
  return max;
}

function ensureAudio() {
  var AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === "suspended" && audioCtx.resume) audioCtx.resume();
}

function playNote(note, duration) {
  playMidi(noteToMidi(note), duration || 0.42);
}

function playMidi(midi, duration) {
  duration = duration || 0.42;
  ensureAudio();
  activeNote = midiToNote(midi);
  highlightActiveKey();
  if (!audioCtx) return;

  var now = audioCtx.currentTime;
  var oscillator = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  oscillator.type = "sine";
  oscillator.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  oscillator.connect(gain);
  gain.connect(audioCtx.destination);
  oscillator.start(now);
  oscillator.stop(now + duration + 0.03);

  window.setTimeout(function () {
    if (activeNote === midiToNote(midi)) {
      activeNote = "";
      highlightActiveKey();
    }
  }, duration * 1000 + 50);
}

function updateLiveState(midi) {
  activeNote = midiToNote(midi);
  var nodes = document.querySelectorAll(".melody-note");
  for (var i = 0; i < nodes.length; i += 1) {
    toggleClass(nodes[i], "active", i === currentNoteIndex);
  }
  highlightActiveKey();
}

function highlightActiveKey() {
  var nodes = document.querySelectorAll("[data-note]");
  for (var i = 0; i < nodes.length; i += 1) {
    var note = nodes[i].getAttribute("data-note");
    toggleClass(nodes[i], "active", note === activeNote || note === startNote);
  }
}

function noteToMidi(note) {
  var match = /^([A-G])(#?)(\d)$/.exec(note);
  if (!match) return 60;
  var offsets = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
  return (Number(match[3]) + 1) * 12 + offsets[match[1]] + (match[2] ? 1 : 0);
}

function midiToNote(midi) {
  var octave = Math.floor(midi / 12) - 1;
  var name = noteNames[((midi % 12) + 12) % 12];
  return name + octave;
}

function scrollStartNoteIntoView() {
  var key = document.querySelector('[data-note="' + startNote + '"]');
  if (!key) return;
  try {
    key.scrollIntoView({ behavior: "auto", inline: "center", block: "nearest" });
  } catch (error) {
    try {
      key.scrollIntoView(false);
    } catch (innerError) {}
  }
}

function hasClass(node, className) {
  return (" " + node.className + " ").indexOf(" " + className + " ") >= 0;
}

function toggleClass(node, className, enabled) {
  if (node.classList) {
    node.classList.toggle(className, enabled);
    return;
  }
  var exists = hasClass(node, className);
  if (enabled && !exists) node.className += " " + className;
  if (!enabled && exists) node.className = (" " + node.className + " ").replace(" " + className + " ", " ").replace(/^\s+|\s+$/g, "");
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", render, false);
} else {
  render();
}

</script>
  </body>
</html>
